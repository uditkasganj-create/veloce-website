<!DOCTYPE html>

    <!-- Primary Meta Tags -->
    <title>Veloce | Performance Footwear</title>
    <meta name="title" content="Veloce | Performance Footwear" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://veloce.com/" />
    <meta property="og:title" content="Veloce | Performance Footwear" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://veloce.com/" />
    <meta property="twitter:title" content="Veloce | Performance Footwear" />
    <meta property="twitter:description" content="Engineered for the urban athlete who demands precision, speed, and style in every stride." />

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Canonical URL -->

          "https://instagram.com/veloce",
