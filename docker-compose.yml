version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: veloce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: veloce
      POSTGRES_PASSWORD: ${DB_PASSWORD:-veloce_secret_pass}
      POSTGRES_DB: veloce
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veloce -d veloce"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: veloce-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: veloce-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://veloce:${DB_PASSWORD:-veloce_secret_pass}@postgres:5432/veloce
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-super-secret-jwt-key-change-in-production}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - ALLOWED_ORIGINS=https://veloce.com,https://www.veloce.com
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./dist:/app/dist
      - ./server/uploads:/app/uploads

volumes:
  postgres_data:
  redis_data:
